version: "3.8"

services:
  # PostgreSQL - НЕ опубликован наружу (безопасно)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-analyses_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ${POSTGRES_DB:-analyses}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analyses_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # Backend API
  backend:
    build: .
    command: /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-analyses_user}:${POSTGRES_PASSWORD:-}@db:5432/${POSTGRES_DB:-analyses}
      SECRET_KEY: ${SECRET_KEY:-}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://77.239.103.15}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-20}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # Frontend + Nginx (reverse proxy)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
